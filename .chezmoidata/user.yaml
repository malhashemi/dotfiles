# user.name and user.email are prompted during `chezmoi init`
# Values are cached in ~/.config/chezmoi/chezmoi.toml (not in repo)
# See .chezmoi.toml.tmpl for configuration

preferences:
  default_theme: "mocha"
  toggle_themes: ["mocha", "latte"]

  terminal:
    font_family: "JetBrains Mono"
    font_size: 16
    font_size_linux: 12

  # OS-keyed so each machine/theme can point at its own wallpaper directory.
  # Selected by sys.platform ("darwin" / "linux") by the theme-system.
  wallpaper_folders:
    darwin:
      mocha: "~/Pictures/walls-catppuccin-mocha"
      latte: "~/Pictures/walls-catppuccin-mocha"
      dynamic: "~/Pictures/Wallpapers"
    linux:
      mocha: "~/Pictures/Wallpapers-Catppuccino-Mocha"
      latte: "~/Pictures/Wallpapers-Catppuccino-Mocha"
      dynamic: "~/Pictures/Wallpapers"

# Tailscale mesh VPN configuration
# tailscale_enabled is prompted during `chezmoi init` (cached in chezmoi.toml)
# To enable later: chezmoi init --prompt

# tailscale_hosts are prompted during `chezmoi init` (only when tailscale_enabled)
# Values are cached in ~/.config/chezmoi/chezmoi.toml (not in repo)

# Theme sync configuration (push to headless devbox)
theme_sync:
  enabled: true
  # devbox_host uses tailscale_hosts.dev_hub from .chezmoi.toml.tmpl
  auto_push: false      # If true, push after every theme change
