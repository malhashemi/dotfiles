# hyprlock (hyprlang format — separate from the Lua compositor config).
# Colors + blurred wallpaper background are generated by the theme-system
# (HyprlockTheme): hyprlock-colors.conf + hyprlock-bg.png.

source = hyprlock-colors.conf

$font = JetBrainsMono Nerd Font
$bg = $HOME/.config/hypr/hyprlock-bg.png

general {
    hide_cursor = true
    ignore_empty_input = true
}

# Heavily-blurred, fully-opaque wallpaper (diffusion, no transparency).
background {
    monitor =
    path = $bg
}

input-field {
    monitor =
    size = 300, 56
    outline_thickness = 3
    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = true
    inner_color = $surface
    font_color = $on_surface
    outer_color = $primary
    check_color = $primary
    fail_color = $error
    fade_on_empty = false
    placeholder_text = <i>Enter password…</i>
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    rounding = 14
    position = 0, -40
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 8
}

# clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = $primary
    font_size = 96
    font_family = $font
    position = 0, 160
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 10
}

# date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    color = $on_surface_variant
    font_size = 20
    font_family = $font
    position = 0, 70
    halign = center
    valign = center
    shadow_passes = 2
}

# user
label {
    monitor =
    text =    $USER
    color = $primary
    font_size = 16
    font_family = $font
    position = 0, -130
    halign = center
    valign = center
    shadow_passes = 2
}
