general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances
    before_sleep_cmd = loginctl lock-session    # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on  # avoid having to press a key twice to wake the display
}

# dim the backlight after 8 min of inactivity
listener {
    timeout = 480
    on-timeout = brightnessctl -s set 10
    on-resume = brightnessctl -r
}

# lock the screen after 10 min
listener {
    timeout = 600
    on-timeout = loginctl lock-session
}

# turn the display off after 11 min
listener {
    timeout = 660
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on && brightnessctl -r
}

# suspend after 30 min
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}
