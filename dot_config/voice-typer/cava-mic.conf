# cava config for the voice-typer HUD equalizer (mic spectrum, raw ASCII output).
# @SOURCE@ is substituted with the default PipeWire source by the `cava-mic`
# launcher at runtime, so no device-specific name is committed.

[general]
mode = normal
framerate = 60
bars = 24
autosens = 1
# Mic input is much quieter than music; boost so the bars react to speech.
sensitivity = 250
lower_cutoff_freq = 60
higher_cutoff_freq = 5000

[input]
method = pipewire
source = @SOURCE@

[output]
method = raw
raw_target = /dev/stdout
data_format = ascii
ascii_max_range = 100
bar_delimiter = 59
frame_delimiter = 10
channels = mono

[smoothing]
noise_reduction = 35
